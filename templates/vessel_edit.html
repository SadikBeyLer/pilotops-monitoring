{% extends 'base.html' %}
{% block title %}Gemi Düzenle — PilotOps{% endblock %}
{% block content %}

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
  <div style="font-size:20px;font-weight:800;color:#1a1a1a">✏️ {{ vessel.gemi_adi }}</div>
  <a href="/vessels" class="btn btn-secondary">← Geri</a>
</div>

<form method="POST">

  {# ── Satır 1: Kimlik ── #}
  <div class="card" style="padding:14px 16px;margin-bottom:10px">
    <div style="display:grid;grid-template-columns:1fr 2fr 1fr 1fr 1fr;gap:10px;align-items:end">
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">IMO</label>
        <input type="text" name="imo_no" value="{{ vessel.imo_no or '' }}" placeholder="9876543"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Gemi Adı *</label>
        <input type="text" name="gemi_adi" required value="{{ vessel.gemi_adi or '' }}"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px;font-weight:600">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Bayrak</label>
        <select name="bayrak" style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
          <option value="">—</option>
          {% for b in ['Türkiye','Panama','Liberia','Marshall Isl.','Bahamas','Comoros','Singapore','Malta','Cyprus','Russian Fed.','Belize','Vanuatu'] %}
          <option {% if vessel.bayrak == b %}selected{% endif %}>{{ b }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Tip</label>
        <select name="tip" style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
          <option value="">—</option>
          {% for val, lbl in [('Gnr','Gnr'),('Tan','Tan'),('Con','Con'),('Blk','Blk'),('Ro','Ro'),('DIY','DIY'),('D5a','D5a')] %}
          <option value="{{ val }}" {% if vessel.tip == val %}selected{% endif %}>{{ lbl }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Tehlikeli</label>
        <div style="display:flex;align-items:center;gap:6px;height:36px;margin-top:2px">
          <input type="checkbox" name="tehlikeli_yuk" id="teh" {% if vessel.tehlikeli_yuk %}checked{% endif %} style="width:16px;height:16px;cursor:pointer">
          <label for="teh" style="font-size:13px;cursor:pointer;font-weight:500;color:#c0152a">⚠️ IMDG</label>
        </div>
      </div>
    </div>
  </div>

  {# ── Satır 2: Teknik ── #}
  <div class="card" style="padding:14px 16px;margin-bottom:10px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:10px;align-items:end">
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">GRT</label>
        <input type="number" name="grt" value="{{ vessel.grt or '' }}" placeholder="12075" step="1"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">LOA (m)</label>
        <input type="number" name="loa" value="{{ vessel.loa or '' }}" placeholder="145" step="0.1"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Baş Draft</label>
        <input type="number" name="draft_bas" value="{{ vessel.draft_bas or '' }}" placeholder="3.5" step="0.01"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Kıç Draft</label>
        <input type="number" name="draft_kic" value="{{ vessel.draft_kic or '' }}" placeholder="5.5" step="0.01"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Thruster</label>
        <div style="display:flex;gap:4px">
          <select name="thruster_bas" style="flex:1;border:1px solid #d8d8d8;border-radius:7px;padding:8px 6px;font-size:13px">
            {% for i in [0,1,2] %}<option value="{{ i }}" {% if vessel.thruster_bas == i %}selected{% endif %}>Baş:{{ i }}</option>{% endfor %}
          </select>
          <select name="thruster_kic" style="flex:1;border:1px solid #d8d8d8;border-radius:7px;padding:8px 6px;font-size:13px">
            {% for i in [0,1,2] %}<option value="{{ i }}" {% if vessel.thruster_kic == i %}selected{% endif %}>Kıç:{{ i }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Tug</label>
        <div style="display:flex;gap:4px">
          <select name="tug_var" style="flex:1;border:1px solid #d8d8d8;border-radius:7px;padding:8px 6px;font-size:13px">
            <option value="0" {% if not vessel.tug_var or vessel.tug_var|int==0 %}selected{% endif %}>Yok</option>
            <option value="1" {% if vessel.tug_var and vessel.tug_var|int==1 %}selected{% endif %}>Var</option>
          </select>
          <input type="number" name="tug_adet" value="{{ vessel.tug_adet or '' }}" placeholder="2" min="0" max="9"
            style="flex:1;border:1px solid #d8d8d8;border-radius:7px;padding:8px 6px;font-size:13px">
        </div>
      </div>
    </div>
  </div>

  {# ── Satır 3: Sefer & Operasyon ── #}
  <div class="card" style="padding:14px 16px;margin-bottom:10px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:10px;align-items:end">
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">From</label>
        <input type="text" name="from_liman" value="{{ vessel.from_liman or '' }}" placeholder="TRISK"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">To</label>
        <input type="text" name="to_liman" value="{{ vessel.to_liman or '' }}" placeholder="TRMRN"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">ETA</label>
        <input type="datetime-local" name="gelis_zamani" id="eta-input"
          value="{{ vessel.gelis_zamani[:16] if vessel.gelis_zamani else '' }}"
          oninput="etaKontrol()"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:13px">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Durum</label>
        <select name="durum" style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
          {% for val, lbl in [('gelecek','🕐 Gelecek'),('demirde','⚓ Demirde'),('iskeleler','🏗️ İskeleler'),('k_samandira','🔺 K.Şam.'),('g_samandira','▲ G.Şam.'),('toros','🏭 Toros'),('manevrada','🚢 Manevrada'),('irtibatta','📡 İrtibatta')] %}
          <option value="{{ val }}" {% if vessel.durum == val %}selected{% endif %}>{{ lbl }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Acenta</label>
        <input type="text" name="acenta" value="{{ vessel.acenta or '' }}" placeholder="Acenta"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Process</label>
        <input type="text" name="process" value="{{ vessel.process or '' }}" placeholder="BK 16/16"
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
      </div>
    </div>
    <div id="eta-uyari" style="display:none;margin-top:8px;padding:7px 10px;border-radius:6px;background:#FFF3E0;color:#7A4800;font-size:12px;font-weight:600"></div>
  </div>

  {# ── Satır 4: Not + Butonlar ── #}
  <div class="card" style="padding:14px 16px;margin-bottom:10px">
    <div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center">
      <div>
        <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:4px">Not</label>
        <input type="text" name="not_alani" value="{{ vessel.not_alani or '' }}" placeholder="Serbest not..."
          style="width:100%;border:1px solid #d8d8d8;border-radius:7px;padding:8px 10px;font-size:14px">
      </div>
      <div style="display:flex;gap:8px;padding-top:18px">
        <a href="/vessels" class="btn btn-secondary">İptal</a>
        <button type="submit" class="btn btn-primary">Kaydet</button>
      </div>
    </div>
  </div>

</form>

<script>
function etaKontrol(){
  var eta = document.getElementById('eta-input');
  var uyari = document.getElementById('eta-uyari');
  if(!eta.value){ uyari.style.display='none'; return; }
  var secilen = new Date(eta.value);
  var now = new Date();
  var minDate = new Date(now.getTime() - 1*24*60*60*1000);
  var maxDate = new Date(now.getTime() + 15*24*60*60*1000);
  if(secilen < minDate){
    uyari.textContent = '⚠️ ETA çok geride — en fazla 1 gün öncesi girilebilir.';
    uyari.style.display = 'block';
  } else if(secilen > maxDate){
    uyari.textContent = '⚠️ ETA çok ilerde — en fazla 15 gün sonrası girilebilir.';
    uyari.style.display = 'block';
  } else {
    uyari.style.display = 'none';
  }
}
</script>
{% endblock %}
