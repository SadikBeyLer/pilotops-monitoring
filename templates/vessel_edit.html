{% extends 'base.html' %}
{% block title %}Gemi Düzenle — PilotOps{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-title">Gemi Düzenle</div>
  <a href="/vessels" class="btn btn-secondary">← Geri</a>
</div>

<form method="POST" style="max-width:720px;margin:0 auto;padding-bottom:80px"></form>

  <div class="section">
    <div class="section-title">Kimlik</div>
    <div class="grid3">
      <div class="form-group">
        <label>IMO</label>
        <input type="text" name="imo_no" value="{{ vessel.imo_no or '' }}" placeholder="9876543">
      </div>
      <div class="form-group">
        <label>Gemi Adı *</label>
        <input type="text" name="gemi_adi" required value="{{ vessel.gemi_adi or '' }}">
      </div>
      <div class="form-group">
        <label>Bayrak</label>
        <select name="bayrak">
          <option value="">Seç...</option>
          {% for b in ['Türkiye','Panama','Liberia','Marshall Isl.','Bahamas','Comoros','Singapore','Malta','Cyprus','Russian Fed.','Belize','Vanuatu'] %}
          <option {% if vessel.bayrak == b %}selected{% endif %}>{{ b }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Teknik</div>
    <div class="grid4">
      <div class="form-group">
        <label>Tip</label>
        <select name="tip">
          <option value="">Seç...</option>
          {% for val, lbl in [('Gnr','Gnr — General'),('Tan','Tan — Tanker'),('Con','Con — Container'),('Blk','Blk — Bulk'),('Ro','Ro — Ro-Ro'),('DIY','DIY — Dry bulk'),('D5a','D5a — Offshore')] %}
          <option value="{{ val }}" {% if vessel.tip == val %}selected{% endif %}>{{ lbl }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>GRT</label>
        <input type="number" name="grt" value="{{ vessel.grt or '' }}" placeholder="12075" step="1">
      </div>
      <div class="form-group">
        <label>LOA (m)</label>
        <input type="number" name="loa" value="{{ vessel.loa or '' }}" placeholder="145" step="0.1">
      </div>
      <div class="form-group">
        <label>Thruster</label>
        <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
          <select name="thruster_bas" style="flex:1;border:1px solid #d8d8d8;border-radius:7px;padding:9px 8px;font-size:14px">
            {% for i in [0,1,2] %}
            <option value="{{ i }}" {% if vessel.thruster_bas == i %}selected{% endif %}>Baş: {{ i }}</option>
            {% endfor %}
          </select>
          <select name="thruster_kic" style="flex:1;border:1px solid #d8d8d8;border-radius:7px;padding:9px 8px;font-size:14px">
            {% for i in [0,1,2] %}
            <option value="{{ i }}" {% if vessel.thruster_kic == i %}selected{% endif %}>Kıç: {{ i }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:4px">
      <div class="form-group">
        <label>F/A Draft (m)</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" name="draft_bas" value="{{ vessel.draft_bas or '' }}" placeholder="3.5" step="0.01" min="0" max="25"
            style="flex:1;border:1px solid #d8d8d8;border-radius:7px;padding:9px 10px;font-size:15px">
          <span style="color:#aaa;font-weight:600;font-size:16px">/</span>
          <input type="number" name="draft_kic" value="{{ vessel.draft_kic or '' }}" placeholder="5.5" step="0.01" min="0" max="25"
            style="flex:1;border:1px solid #d8d8d8;border-radius:7px;padding:9px 10px;font-size:15px">
        </div>
      </div>
      <div class="form-group">
        <label>Tug</label>
        <div style="display:flex;align-items:center;gap:8px">
          <select name="tug_var" style="flex:1;border:1px solid #d8d8d8;border-radius:7px;padding:9px 8px;font-size:15px">
            <option value="0" {% if not vessel.tug_var or vessel.tug_var|int == 0 %}selected{% endif %}>Yok</option>
            <option value="1" {% if vessel.tug_var and vessel.tug_var|int == 1 %}selected{% endif %}>Var</option>
          </select>
          <span style="color:#aaa;font-weight:600;font-size:16px">/</span>
          <input type="number" name="tug_adet" value="{{ vessel.tug_adet or '' }}" placeholder="2" min="0" max="9"
            style="flex:1;border:1px solid #d8d8d8;border-radius:7px;padding:9px 10px;font-size:15px">
        </div>
      </div>
      <div class="form-group">
        <label>Tehlikeli Yük</label>
        <div style="display:flex;align-items:center;gap:8px;height:42px;margin-top:6px">
          <input type="checkbox" name="tehlikeli_yuk" id="teh"
            {% if vessel.tehlikeli_yuk %}checked{% endif %}
            style="width:18px;height:18px;cursor:pointer">
          <label for="teh" style="font-size:14px;cursor:pointer;font-weight:400;text-transform:none;letter-spacing:0;color:#444">IMDG var</label>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Sefer & Operasyon</div>
    <div class="grid3">
      <div class="form-group">
        <label>From</label>
        <input type="text" name="from_liman" value="{{ vessel.from_liman or '' }}" placeholder="TRISK">
      </div>
      <div class="form-group">
        <label>To</label>
        <input type="text" name="to_liman" value="{{ vessel.to_liman or '' }}" placeholder="TRMRN">
      </div>
      <div class="form-group">
        <label>ETA</label>
        <input type="datetime-local" name="gelis_zamani" id="eta-input"
          value="{{ vessel.gelis_zamani[:16] if vessel.gelis_zamani else '' }}"
          oninput="etaKontrol()">
        <div id="eta-uyari" style="display:none;margin-top:6px;padding:7px 10px;border-radius:6px;background:#FFF3E0;color:#7A4800;font-size:12px;font-weight:600"></div>
      </div>
    </div>
    <div class="grid3" style="margin-top:4px">
      <div class="form-group">
        <label>Durum</label>
        <select name="durum">
          {% for val, lbl in [('gelecek','🕐 Gelecek'),('demirde','⚓ Demirde'),('iskeleler','🏗️ İskeleler'),('k_samandira','🔺 Kuzey Şam.'),('g_samandira','▲ Güney Şam.'),('toros','🏭 Toros'),('manevrada','🚢 Manevrada'),('irtibatta','📡 İrtibatta')] %}
          <option value="{{ val }}" {% if vessel.durum == val %}selected{% endif %}>{{ lbl }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Acenta</label>
        <input type="text" name="acenta" value="{{ vessel.acenta or '' }}" placeholder="Acenta adı">
      </div>
      <div class="form-group">
        <label>Process</label>
        <input type="text" name="process" value="{{ vessel.process or '' }}" placeholder="BK 16/16">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Not</div>
    <div class="form-group" style="margin-bottom:0">
      <input type="text" name="not_alani" value="{{ vessel.not_alani or '' }}" placeholder="Serbest not...">
    </div>
  </div>

  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
    <a href="/vessels" class="btn btn-secondary">İptal</a>
    <button type="submit" class="btn btn-primary">Kaydet</button>
  </div>

</form>

<script>
function etaKontrol(){
  var eta = document.getElementById('eta-input');
  var uyari = document.getElementById('eta-uyari');
  if(!eta.value){ uyari.style.display='none'; return; }
  var secilen = new Date(eta.value);
  var now = new Date();
  var minDate = new Date(now.getTime() - 1*24*60*60*1000);
  var maxDate = new Date(now.getTime() + 15*24*60*60*1000);
  if(secilen < minDate){
    uyari.textContent = '⚠️ ETA çok geride — en fazla 1 gün öncesi girilebilir.';
    uyari.style.display = 'block';
  } else if(secilen > maxDate){
    uyari.textContent = '⚠️ ETA çok ilerde — en fazla 15 gün sonrası girilebilir.';
    uyari.style.display = 'block';
  } else {
    uyari.style.display = 'none';
  }
}
</script>
{% endblock %}
