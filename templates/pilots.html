{% extends 'base.html' %}
{% block title %}Kaptanlar — PilotOps{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-title">Kaptanlar</div>
  <a href="/pilots/add" class="btn btn-primary">+ Kaptan ekle</a>
</div>
<div class="card">
<table style="width:100%;border-collapse:collapse">
  <thead>
    <tr style="background:#F8F8F8;border-bottom:1px solid #e8e8e8">
      <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;color:#888">Ad Soyad</th>
      <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;color:#888">Telefon</th>
      <th style="padding:10px 14px;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;color:#888">Durum</th>
    </tr>
  </thead>
  <tbody>
  {% for p in pilots %}
  <tr style="border-bottom:1px solid #f0f0f0">
    <td style="padding:10px 14px;font-weight:600">{{ p.ad_soyad }}</td>
    <td style="padding:10px 14px;color:#666">{{ p.telefon or '—' }}</td>
    <td style="padding:10px 14px;text-align:center">
      <span class="badge badge-green">Aktif</span>
    </td>
  </tr>
  {% else %}
  <tr><td colspan="3" style="padding:32px;text-align:center;color:#aaa">Henüz kaptan yok</td></tr>
  {% endfor %}
  </tbody>
</table>
</div>
{% endblock %}
